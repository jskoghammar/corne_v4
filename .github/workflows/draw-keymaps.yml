# Draw ZMK keymaps with one keymap-drawer invocation per layer.
name: Draw ZMK keymaps
on:
  workflow_dispatch:  # can be triggered manually
  push:               # automatically run on changes to following paths
    paths:
      - "config/*.keymap"
      - "config/*.dtsi"
      - "config/keymap_drawer.config.yaml"
      - ".github/workflows/draw-keymaps.yml"
      # - 'boards/*/*/*.keymap'

permissions:
  contents: write

env:
  KEYMAP_PATTERNS: "config/*.keymap"
  KEYMAP_LAYERS: "Base Nav Sym"
  OUTPUT_FOLDER: "keymap-drawer"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw one SVG per configured layer
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -rf "${OUTPUT_FOLDER}"
          mkdir -p "${OUTPUT_FOLDER}" "${OUTPUT_FOLDER}/img"

          drawer_config="config/keymap_drawer.config.yaml"

          read -r -a layers <<< "${KEYMAP_LAYERS}"
          if [[ ${#layers[@]} -eq 0 ]]; then
            echo "KEYMAP_LAYERS must include at least one layer name."
            exit 1
          fi

          keymaps=( ${KEYMAP_PATTERNS} )
          if [[ ${#keymaps[@]} -eq 0 ]]; then
            echo "No keymaps matched: ${KEYMAP_PATTERNS}"
            exit 1
          fi

          for keymap_file in "${keymaps[@]}"; do
            keymap_name="$(basename "${keymap_file%.keymap}")"
            parsed_yaml="${OUTPUT_FOLDER}/${keymap_name}.yaml"
            keymap parse -z "${keymap_file}" > "${parsed_yaml}"

            for layer in "${layers[@]}"; do
              layer_slug="$(echo "${layer}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]_-')"
              output_svg="${OUTPUT_FOLDER}/img/${keymap_name}-${layer_slug}.svg"
              keymap -c "${drawer_config}" draw -s "${layer}" -- "${parsed_yaml}" > "${output_svg}"
            done
          done

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Draw keymaps"
          file_pattern: "keymap-drawer/**"
